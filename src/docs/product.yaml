paths:
  /api/v1/products:
    get:
      summary: Get all products
      description: Retrieves a list of all non-deleted products with support for filtering, sorting, and pagination.
      tags:
        - Products
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: name
          schema:
            type: string
          description: Filter products by name (case-insensitive regex)
        - in: query
          name: sku
          schema:
            type: string
          description: Filter products by SKU (case-insensitive regex)
        - in: query
          name: category
          schema:
            type: string
          description: Filter products by category (case-insensitive regex)
        - in: query
          name: sortBy
          schema:
            type: string
            default: createdAt
          description: Field to sort by
        - in: query
          name: sortOrder
          schema:
            type: string
            enum: [asc, desc]
            default: asc
          description: Sort order
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: Page number
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
          description: Number of items per page
      responses:
        200:
          description: Products retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Products retrieved successfully
                  meta:
                    type: object
                    properties:
                      total:
                        type: integer
                        example: 45
                      page:
                        type: integer
                        example: 1
                      limit:
                        type: integer
                        example: 10
                      pages:
                        type: integer
                        example: 5
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Product'
        401:
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        500:
          description: Internal Server Error

    post:
      summary: Create a new product
      description: Creates a new product in the database. Supports uploading up to 5 product images. Only Admins and Managers are authorized.
      tags:
        - Products
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - name
                - sku
                - category
                - purchasePrice
                - sellingPrice
                - productImages
              properties:
                name:
                  type: string
                  example: Wireless Mouse
                sku:
                  type: string
                  example: MS-WRL-01
                category:
                  type: string
                  example: Electronics
                purchasePrice:
                  type: number
                  example: 10.50
                sellingPrice:
                  type: number
                  example: 15.00
                stockQuantity:
                  type: integer
                  default: 0
                  example: 100
                productImages:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Product image files (maximum 5)
      responses:
        201:
          description: Product created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Product created successfully
                  data:
                    $ref: '#/components/schemas/Product'
        400:
          description: Invalid input or missing product images
        401:
          description: Unauthorized
        403:
          description: Forbidden - Only Admin and Manager roles permitted
        500:
          description: Internal Server Error

  /api/v1/products/dropdown:
    get:
      summary: Get products for select dropdown
      description: Fetches a minimized list of active, in-stock products containing only necessary fields for select/dropdown menus.
      tags:
        - Products
      security:
        - bearerAuth: []
      responses:
        200:
          description: Dropdown products fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Dropdown products fetched successfully
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProductDropdownItem'
        401:
          description: Unauthorized
        500:
          description: Internal Server Error

  /api/v1/products/{id}:
    patch:
      summary: Update an existing product
      description: Updates the details of a specific product. Supports replacing/adding product images. Only Admins and Managers are authorized.
      tags:
        - Products
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Product ID
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: Wireless Mouse (V2)
                sku:
                  type: string
                  example: MS-WRL-01-V2
                category:
                  type: string
                  example: Electronics
                purchasePrice:
                  type: number
                  example: 12.00
                sellingPrice:
                  type: number
                  example: 18.00
                stockQuantity:
                  type: integer
                  example: 150
                productImages:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: New product image files to associate
      responses:
        200:
          description: Product updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Product updated successfully
                  data:
                    $ref: '#/components/schemas/Product'
        400:
          description: Validation error or invalid ID
        401:
          description: Unauthorized
        403:
          description: Forbidden
        404:
          description: Product not found
        500:
          description: Internal Server Error

    get:
      summary: Get a single product by ID
      description: Retrieves the full details of a specific product by its ID.
      tags:
        - Products
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Product ID
      responses:
        200:
          description: Product retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Product retrieved successfully
                  data:
                    $ref: '#/components/schemas/Product'
        401:
          description: Unauthorized
        404:
          description: Product not found
        500:
          description: Internal Server Error

    delete:
      summary: Soft delete a product by ID
      description: Deletes a product by marking it as deleted (`isDeleted` = true). Only Admins are authorized to perform this operation.
      tags:
        - Products
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Product ID
      responses:
        200:
          description: Product deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Product deleted successfully
                  data:
                    $ref: '#/components/schemas/Product'
        401:
          description: Unauthorized
        403:
          description: Forbidden - Only Admins can delete products
        404:
          description: Product not found
        500:
          description: Internal Server Error
